<!DOCTYPE html>
<html>

<head>
    <title>Global Micro-Volunteering Platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🌍 Micro-Volunteer Hub</h1>
<p>Help the world in minutes</p>
</header>

<section class="task-form">

<h2>Create Task</h2>

<input id="title" placeholder="Task title">
<input id="time" placeholder="Time required">
<textarea id="description" placeholder="Description"></textarea>

<button onclick="addTask()">Post Task</button>

</section>

<section>

<h2>Available Tasks</h2>

<div id="tasks"></div>

</section>

<script src="script.js"></script>

</body>
</html>
